<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Proof for Approval</title>
<link rel="stylesheet" href="./css/styles.css">
</head>
<body>
<header class="mast">
  <div class="mast-in">
    <img class="logo" src="./assets/brand/logo.png" alt="Raiona Denise">
    <img class="logo-print" src="./assets/brand/logo-print.png" alt="Raiona Denise">
    <div class="mast-r">
      <div class="phone" id="mPhone"></div>
      <div class="ci" id="mEmail"></div>
      <div class="ci" id="mWeb"></div>
      <div class="psheet">PROOF SHEET</div>
    </div>
  </div>
</header>
<div class="orule"></div>

<div class="wrap">
  <div id="formview">
    <div class="intro">
      <div class="meta">
        <div class="eyebrow">Proof for Approval</div>
        <h1><span id="h1lead"></span><span class="o" id="h1accent"></span></h1>
        <div class="sub" id="subLine"></div>
      </div>
      <div class="directions" id="directions"></div>
    </div>

    <div class="step"><span class="n">1</span><h2>Select your preferred layout</h2><span class="hint">Tap one to choose</span></div>
    <div class="grid" id="grid"></div>

    <div class="step"><span class="n">2</span><h2>Choose how you're approving</h2></div>
    <div class="panel-card">
      <div class="choices" id="choices"></div>
      <div class="field">
        <label>Changes &amp; Corrections <span class="opt-note">(optional — note anything you want adjusted)</span></label>
        <textarea id="corrections" placeholder="Example: On Layout 03, please bold the email address and brighten the gold."></textarea>
      </div>

      <div class="step" style="margin:30px 0 0;"><span class="n">3</span><h2>Sign off</h2></div>
      <div class="row2" style="margin-top:18px;">
        <div class="field" style="margin-top:0;"><label>Full Name</label><input type="text" id="name" placeholder="Type your full name" autocomplete="name"></div>
        <div class="field" style="margin-top:0;"><label>Date</label><input type="date" id="dateInput"></div>
      </div>

      <div class="consent" id="consent">
        <div class="box"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <p id="disclaimer"></p>
      </div>

      <button class="submit" id="submitBtn">Submit Approval</button>
      <div class="err" id="err"></div>
      <div class="demo noprint" id="demoNote"></div>
    </div>

    <div class="foot noprint" id="footMain"></div>
  </div>

  <div class="done" id="done">
    <div class="seal"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <h2>Approval Received</h2>
    <p>Thank you. Your selection and sign-off have been recorded. A copy is below — you can save or print it for your records.</p>
    <div class="rsec"><h3>Layouts presented in this proof</h3><div class="rgallery" id="rgallery"></div></div>
    <div class="recap" id="recap"></div>
    <button class="printbtn noprint" onclick="window.print()">Save / Print a Copy</button>
    <div class="foot" id="footDone"></div>
  </div>
</div>

<script src="./js/proof-config.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
